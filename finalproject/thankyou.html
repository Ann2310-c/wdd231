<!DOCTYPE html>

<body>

  <header>
    <div class="header-container">
      <div class="logo">
        <img src="images/logo-flower.png" alt="Logo Flower Garden Colombia">
        <span>Flower Garden Colombia</span>
      </div>
      <button id="menuBtn">☰</button>
      <nav id="navMenu">
        <a href="index.html" class="active">Home</a>
        <a href="flowers.html">Flowers</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>Thank you for your order!</h1>
    <p id="results"></p>
  </main>

  <footer>
    <div class="footer-container">
      <div class="footer-left">
        <strong>Flower Garden Colombia</strong><br>
        <p>Fresh flowers for every occasion.</p>
        Popayán, Colombia<br>
        info@popayanflower.com<br>
        (057) 543-1234
      </div>

      <div class="footer-center">
        <a href="https://www.youtube.com/" target="_blank"><img src="images/youtube.png" alt="Visit our YouTube channel"></a>
        <a href="https://x.com/" target="_blank"><img src="images/x-icon.png" alt="Visit our X profile"></a>
        <a href="https://www.linkedin.com/" target="_blank"><img src="images/linkedin.png" alt="Visit our LinkedIn page"></a>

        <p>Last Modification: <span id="lastModified"></span></p>
      </div>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("results").innerHTML = `
      <p><strong>Nombre:</strong> ${params.get("fname")}</p>
      <p><strong>Correo:</strong> ${params.get("email")}</p>
      <p><strong>Teléfono:</strong> ${params.get("phone")}</p>
      <p><strong>Flor:</strong> ${params.get("flower")}</p>
      <p><strong>Cantidad:</strong> ${params.get("quantity")}</p>
      <p><strong>Mensaje:</strong> ${params.get("message")}</p>
      <p><strong>Fecha:</strong> ${new Date(params.get("timestamp")).toLocaleString()}</p>`;
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
