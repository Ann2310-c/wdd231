<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Contáctanos para pedidos y consultas en Flower Garden Colombia.">
  <meta name="author" content="Ana Mosquera">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Contacto | Flower Garden Colombia">
  <meta property="og:description" content="Haz tu pedido de flores frescas y arreglos personalizados.">
  <meta property="og:image" content="images/logo-flower.png">
  <meta property="og:url" content="contact.html">
  <title>Contact | Flower Garden Colombia</title>
  <link rel="icon" href="images/favicon.ico">
  <link rel="stylesheet" href="styles/normalize.css">
  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/larger.css">
  <script type="module" src="scripts/contact.mjs"></script>
</head>

<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <img src="images/logo-flower.png" alt="Logo Flower Garden Colombia">
        <span>Flower Garden Colombia</span>
      </div>
      <button id="menuBtn">☰</button>
      <nav id="navMenu">
        <a href="index.html">Home</a>
        <a href="flowers.html">Flowers</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>Place your order</h1>
    <form method="get" action="thankyou.html">
      <label>Full Name <input type="text" name="fname" required></label>
      <label>Email Address<input type="email" name="email" required></label>
      <label>TPhone Number <input type="tel" name="phone" required></label>
      <label>Flower <input type="text" name="flower" required></label>
      <label>Quantity <input type="number" name="quantity" required></label>
      <label>Message <textarea name="message"></textarea></label>
      <input type="hidden" name="timestamp" id="timestamp">
      <input type="submit" value="Enviar Pedido">
    </form>
  </main>

  <footer>
    <div class="footer-container">
      <div class="footer-left">
        <strong>Flower Garden Colombia</strong><br>
        <p>Fresh flowers for every occasion.</p>
        Popayán, Colombia<br>
        info@popayanflower.com<br>
        (057) 543-1234
      </div>

      <div class="footer-center">
        <a href="https://www.youtube.com/" target="_blank"><img src="images/youtube.png" alt="Visit our YouTube channel"></a>
        <a href="https://x.com/" target="_blank"><img src="images/x-icon.png" alt="Visit our X profile"></a>
        <a href="https://www.linkedin.com/" target="_blank"><img src="images/linkedin.png" alt="Visit our LinkedIn page"></a>
      </div>

      <a href="attributions.html">Attributions</a>
      <a href="YOUR_VIDEO_LINK">Project Video</a>

      <div class="footer-right">
        <p>WDD231 Final Project</p>
        <p>Ana Mosquera</p>
        <p>© <span id="year"></span> Flower Garden Colombia</p>
        <p>Last Modification: <span id="lastModified"></span></p>
      </div>
    </div>
  </footer>
  
</body>
</html>
